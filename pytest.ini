[pytest]
# ─────────────────────────────────────────
# إعداد pytest للمساعد القانوني
# ─────────────────────────────────────────
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# إظهار تفاصيل الفشل
addopts =
    -v
    --tb=short
    --no-header
    -rN

# تصفية التحذيرات
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
